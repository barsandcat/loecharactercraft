<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lands of Evershade Character Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Lands of Evershade</p>
        <h1>Character Builder</h1>
      </div>
      <div class="hero-actions">
        <button id="newBuildButton" class="ghost-button" type="button" disabled>New Build</button>
        <button id="randomButton" class="ghost-button" type="button" disabled>Randomize</button>
        <button id="resetButton" class="ghost-button" type="button" disabled>Reset</button>
        <button id="copyLinkButton" class="ghost-button" type="button" disabled>Copy link</button>
      </div>
    </header>

    <div id="errorBanner" class="error-banner hidden" role="alert"></div>

    <section class="board" aria-label="Character builder workspace">
      <section class="panel" aria-labelledby="controlsTitle">
        <div class="panel-header">
          <h2 id="controlsTitle">Build Steps</h2>
        </div>
        <div class="panel-body">
          <div id="controlsPanel" class="stack"></div>
        </div>
      </section>

      <section class="panel" aria-labelledby="summaryTitle">
        <div class="panel-header">
          <h2 id="summaryTitle">Character Board</h2>
        </div>
        <div class="panel-body">
          <div id="summaryPanel" class="summary-grid"></div>
        </div>
      </section>

      <section class="panel" aria-labelledby="treesTitle">
        <div class="panel-header">
          <h2 id="treesTitle">Advancement Trees</h2>
        </div>
        <div class="panel-body">
          <div id="treesPanel" class="tree-stack"></div>
        </div>
      </section>
    </section>
  </main>

  <div id="selectorOverlay" class="selector-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="selectorTitle">
    <div class="selector-sheet">
      <div class="selector-header">
        <div>
          <p id="selectorKicker" class="eyebrow">Choose Option</p>
          <h2 id="selectorTitle">Options</h2>
          <p id="selectorDescription" class="hidden"></p>
        </div>
        <button id="selectorClose" class="close-button" type="button" aria-label="Close selector">&times;</button>
      </div>
      <div id="selectorOptions" class="selector-options"></div>
    </div>
  </div>

  <div id="confirmOverlay" class="selector-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
    <div class="selector-sheet confirm-sheet">
      <div class="selector-header">
        <div>
          <p class="eyebrow">Confirm Action</p>
          <h2 id="confirmTitle">Erase Current Build?</h2>
        </div>
        <button id="confirmClose" class="close-button" type="button" aria-label="Close confirmation">&times;</button>
      </div>
      <p id="confirmMessage" class="confirm-message">This will erase all choices!</p>
      <div class="confirm-actions">
        <button id="confirmCancel" class="option-card" type="button">
          <span class="option-title">Cancel</span>
        </button>
        <button id="confirmAccept" class="option-card active" type="button">
          <span class="option-title">Continue</span>
        </button>
      </div>
    </div>
  </div>

  <noscript>
    <div class="app-shell">
      <div class="error-banner">This page needs JavaScript to run the character builder.</div>
    </div>
  </noscript>

  <script type="module" src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lands of Evershade Character Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:             #EDE8DC;
      --panel:          #F0EAD8;
      --panel-strong:   #F5F0E8;
      --panel-border:   rgba(70, 48, 12, 0.22);
      --gold:           #C9A840;
      --gold-text:      #9A7220;

      --dark:           #1C1610;
      --dark-text:      #F0EAD8;
      --ink:            #1E1610;
      --muted:          #6B5030;
      --label:          #8B7040;
      --danger:         #7A2520;
      --danger-soft:    #F0D8D0;
      --selected:       #9A7220;
      --available:      #264820;
      --unavailable:    #8B7860;
      --shadow:         0 4px 16px rgba(20, 12, 4, 0.18);
      --shadow-lg:      0 8px 28px rgba(20, 12, 4, 0.26);
      --gold-bar-h:     10px;
    }

    * { box-sizing: border-box; }
    html {
      color-scheme: light;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 16px;
      color: var(--ink);
      background: var(--bg);
      overflow-x: hidden;
    }

    /* Gold bars — top and bottom of page */
    body::before,
    body::after {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      height: var(--gold-bar-h);
      background: linear-gradient(90deg, #6A4C10 0%, #C9A840 25%, #EDD878 50%, #C9A840 75%, #6A4C10 100%);
      z-index: 200;
      pointer-events: none;
    }
    body::before { top: 0; }
    body::after  { bottom: 0; }

    button, input, textarea, select { font: inherit; }

    /* ── App shell ── */
    .app-shell {
      position: relative;
      z-index: 1;
      max-width: 1600px;
      margin: 0 auto;
      padding: calc(var(--gold-bar-h) + 14px) clamp(14px, 2.5vw, 28px) calc(var(--gold-bar-h) + 20px);
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: center;
      margin-bottom: 12px;
      padding: 7px clamp(14px, 3vw, 24px);
      background: var(--dark);
      border: 1px solid rgba(201, 168, 64, 0.28);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
      animation: rise-in 500ms ease-out both;
    }



    .eyebrow {
      margin: 0 0 3px;
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.26em;
      color: var(--gold);
      font-weight: 400;
    }

    h1, h2, h3 {
      margin: 0;
      font-family: 'Cinzel', serif;
      line-height: 1.1;
    }

    h1 {
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      color: var(--dark-text);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-weight: 700;
    }

    .hero-copy {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
      min-width: 200px;
    }

    /* Status chip & ghost button */
    .status-chip,
    .ghost-button {
      padding: 6px 14px;
      border: 1px solid rgba(201, 168, 64, 0.38);
      background: rgba(201, 168, 64, 0.06);
      color: var(--dark-text);
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border-radius: 1px;
    }

    .status-chip {
      font-weight: 600;
      color: var(--gold);
    }

    .ghost-button {
      cursor: pointer;
      transition: background 130ms ease, border-color 130ms ease;
    }

    .ghost-button:hover:not(:disabled),
    .ghost-button:focus-visible:not(:disabled) {
      background: rgba(201, 168, 64, 0.16);
      border-color: var(--gold);
      outline: none;
    }

    .ghost-button:disabled {
      opacity: 0.38;
      cursor: not-allowed;
    }

    /* Error banner */
    .error-banner {
      margin-bottom: 12px;
      padding: 10px 14px;
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid rgba(122, 37, 32, 0.2);
      font-family: 'EB Garamond', serif;
    }

    /* ── Board ── */
    .board {
      display: grid;
      grid-template-columns: minmax(300px, 1.08fr) minmax(280px, 0.92fr) minmax(300px, 1fr);
      gap: 12px;
      align-items: start;
    }

    /* ── Panel ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      overflow: hidden;
      box-shadow: var(--shadow);
      animation: rise-in 580ms ease-out both;
    }

    .panel-header {
      padding: 7px 14px;
      background: var(--dark);
      border-bottom: 1px solid rgba(201, 168, 64, 0.18);
    }


    .panel-header h2 {
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      color: var(--dark-text);
      text-transform: uppercase;
      font-weight: 600;
      margin: 0;
    }

    .panel-body {
      padding: 10px 12px 16px;
    }

    /* ── Stack & choice grid ── */
    .stack {
      display: grid;
      gap: 8px;
    }

    .choice-grid {
      display: grid;
      gap: 6px;
    }

    .choice-grid.two-up {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    /* Choice buttons */
    .choice-button {
      display: grid;
      gap: 3px;
      width: 100%;
      padding: 9px 11px;
      text-align: left;
      border: 1px solid var(--panel-border);
      background: var(--panel-strong);
      color: var(--ink);
      cursor: pointer;
      transition: border-color 130ms ease, background 130ms ease;
      border-radius: 1px;
    }

    .choice-button:hover:not(:disabled),
    .choice-button:focus-visible:not(:disabled) {
      border-color: rgba(201, 168, 64, 0.5);
      background: #FAF4E6;
      outline: none;
    }

    .choice-button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
    }

    .choice-label {
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--gold-text);
      font-weight: 400;
    }

    .choice-main {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.25;
      white-space: pre-line;
      color: var(--ink);
    }

    .choice-detail {
      font-family: 'EB Garamond', serif;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.3;
      white-space: pre-line;
    }

    .choice-button.is-empty {
      border-color: rgba(201, 168, 64, 0.45);
    }

    /* Accent / selected: dark band style like handbook section headers */
    .choice-button.is-accent {
      background: var(--dark);
      border-color: rgba(201, 168, 64, 0.32);
    }
    .choice-button.is-accent .choice-label  { color: var(--gold); }
    .choice-button.is-accent .choice-main   { color: var(--dark-text); }
    .choice-button.is-accent .choice-detail { color: rgba(240, 234, 216, 0.62); }
    .choice-button.is-accent:hover:not(:disabled) {
      background: #28201A;
      border-color: var(--gold);
    }

    /* ── Summary ── */
    .summary-grid { display: grid; gap: 8px; }

    .summary-card,
    .tree-card,
    .stat-card {
      border: 1px solid var(--panel-border);
      background: var(--panel-strong);
    }

    .summary-card { padding: 11px 12px; }

    .summary-card h3 {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-text);
      font-weight: 600;
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid rgba(201, 168, 64, 0.22);
    }

    /* Stat grid */
    .stat-grid {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .stat-card {
      padding: 9px 6px;
      text-align: center;
      background: var(--dark);
    }

    .stat-value {
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 2px;
    }

    .stat-card.is-over-limit {
      border-color: rgba(122, 37, 32, 0.55);
      background: #2A1210;
    }

    .stat-card.is-over-limit .stat-value {
      color: #E05050;
    }

    .stat-card.is-over-limit .stat-label {
      color: rgba(224, 80, 80, 0.65);
    }

    .stat-label {
      font-family: 'Cinzel', serif;
      color: rgba(240, 234, 216, 0.55);
      font-size: 0.64rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .list-block {
      display: grid;
      gap: 5px;
      margin: 0; padding: 0;
      list-style: none;
    }

    .free-upgrades-chip {
      display: inline-block;
      margin-bottom: 8px;
      padding: 4px 10px;
      background: rgba(201, 168, 64, 0.12);
      border: 1px solid rgba(201, 168, 64, 0.38);
      color: var(--gold-text);
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 600;
    }

    .list-item {
      padding: 6px 9px;
      background: rgba(255, 255, 255, 0.32);
      border: 1px solid rgba(70, 48, 12, 0.1);
      font-family: 'EB Garamond', serif;
      font-size: 0.94rem;
      line-height: 1.35;
      color: var(--ink);
    }

    /* Action Card Categories */
    .action-category-group {
      margin-bottom: 12px;
    }

    .action-category-group:last-child {
      margin-bottom: 0;
    }

    .action-category-title {
      font-family: 'Cinzel', serif;
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--gold-text);
      font-weight: 600;
      margin: 0 0 6px 0;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(201, 168, 64, 0.22);
    }

    .action-list {
      display: grid;
      gap: 5px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .action-list-item {
      padding: 0;
    }

    /* Action Card ID Box */
    .action-card-row {
      display: flex;
      gap: 6px;
      align-items: stretch;
    }

    .action-card-id {
      flex-shrink: 0;
      padding: 7px 8px;
      border: 1px solid rgba(70, 48, 12, 0.1);
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-radius: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      text-align: center;
    }

    .action-card-id.is-action {
      background: var(--dark);
      border-color: rgba(201, 168, 64, 0.32);
      color: var(--gold);
    }

    .action-card-id.is-reaction {
      background: rgba(255, 255, 255, 0.32);
      border-color: rgba(70, 48, 12, 0.1);
      color: var(--ink);
    }

    .action-card-label {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid rgba(70, 48, 12, 0.1);
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem;
      line-height: 1.35;
      color: var(--ink);
      border-radius: 1px;
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.32);
    }

    /* ── Trees ── */
    .tree-stack { display: grid; gap: 10px; }


    .tree-card { padding: 11px 12px; }

    .tree-title-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
      margin-bottom: 8px;
    }

    .tree-title-row h3 {
      font-family: 'Cinzel', serif;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-text);
      font-weight: 600;
    }

    .tree-type {
      color: var(--label);
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .tree-level {
      padding: 6px 0;
      border-top: 1px solid rgba(70, 48, 12, 0.1);
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .tree-level:first-of-type { border-top: 0; padding-top: 0; }

    .tree-level-header {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 58px;
      flex-shrink: 0;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .tree-level-header span:last-child {
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      font-weight: 400;
    }

    .tree-level.selected .tree-level-header,
    .tree-level.selected .tree-version.selected { color: var(--selected); }
    .tree-level.available .tree-level-header,
    .tree-level.available .tree-version         { color: var(--available); }
    .tree-level.unavailable .tree-level-header,
    .tree-level.unavailable .tree-version       { color: var(--unavailable); }

    .tree-version-list { display: grid; gap: 4px; flex: 1; min-width: 0; }

    .tree-version {
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.28);
      border: 1px solid rgba(70, 48, 12, 0.08);
      font-family: 'EB Garamond', serif;
      font-size: 0.88rem;
      line-height: 1.3;
      color: var(--muted);
    }
    .tree-version.selected {
      border-color: rgba(154, 114, 32, 0.26);
      background: rgba(201, 168, 64, 0.1);
      color: var(--ink);
      font-weight: 600;
    }

    /* ── Empty state ── */
    .empty-state {
      padding: 14px;
      border: 1px dashed rgba(70, 48, 12, 0.2);
      background: rgba(255, 255, 255, 0.28);
      color: var(--muted);
      font-family: 'EB Garamond', serif;
      font-size: 0.94rem;
      line-height: 1.5;
      font-style: italic;
    }


    /* ── Selector overlay ── */
    .selector-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      justify-content: flex-end;
      background: rgba(14, 10, 4, 0.65);
      backdrop-filter: blur(3px);
      padding-left: min(8vw, 64px);
      animation: fade-in 160ms ease-out both;
    }

    .selector-sheet {
      width: min(520px, 100%);
      height: 100%;
      padding: 18px 20px;
      background: var(--panel);
      border-left: 1px solid rgba(201, 168, 64, 0.22);
      box-shadow: -10px 0 28px rgba(14, 10, 4, 0.3);
      overflow-y: auto;
      animation: slide-in 200ms ease-out both;
    }

    .selector-header {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(201, 168, 64, 0.22);
    }

    .selector-header p {
      margin: 3px 0 0;
      color: var(--muted);
      font-family: 'EB Garamond', serif;
      font-size: 0.94rem;
    }

    .selector-header h2 {
      font-size: 0.9rem;
      letter-spacing: 0.18em;
      color: var(--gold-text);
      text-transform: uppercase;
    }

    .close-button {
      width: 34px; height: 34px;
      flex-shrink: 0;
      border: 1px solid rgba(201, 168, 64, 0.3);
      border-radius: 1px;
      background: rgba(201, 168, 64, 0.06);
      color: var(--gold-text);
      font-size: 1rem;
      cursor: pointer;
      transition: background 130ms ease;
    }
    .close-button:hover,
    .close-button:focus-visible {
      background: rgba(201, 168, 64, 0.18);
      outline: none;
    }

    .selector-options { display: grid; gap: 8px; }

    .option-card {
      display: grid;
      gap: 5px;
      width: 100%;
      padding: 12px 14px;
      text-align: left;
      border: 1px solid var(--panel-border);
      background: var(--panel-strong);
      color: var(--ink);
      cursor: pointer;
      transition: border-color 130ms ease, background 130ms ease;
      border-radius: 1px;
    }
    .option-card:hover,
    .option-card:focus-visible {
      border-color: rgba(201, 168, 64, 0.48);
      background: #FAF4E6;
      outline: none;
    }
    .option-card.active {
      background: var(--dark);
      border-color: rgba(201, 168, 64, 0.38);
    }
    .option-card.active .option-title  { color: var(--dark-text); }
    .option-card.active .option-detail { color: rgba(240, 234, 216, 0.6); }

    .option-title-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }

    .option-title {
      font-family: 'EB Garamond', serif;
      font-size: 1.02rem;
      font-weight: 600;
      line-height: 1.3;
      white-space: pre-line;
      color: var(--ink);
    }

    .option-check {
      flex-shrink: 0;
      min-width: 24px; height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(201, 168, 64, 0.12);
      border: 1px solid rgba(201, 168, 64, 0.38);
      color: var(--gold-text);
      font-family: 'Cinzel', serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .option-detail {
      color: var(--muted);
      font-family: 'EB Garamond', serif;
      font-size: 0.88rem;
      line-height: 1.38;
      white-space: pre-line;
    }

    /* ── Utilities ── */
    .visually-hidden {
      position: absolute; width: 1px; height: 1px;
      margin: -1px; padding: 0; overflow: hidden;
      clip: rect(0 0 0 0); border: 0;
    }
    .hidden { display: none !important; }

    /* ── Animations ── */
    @keyframes rise-in {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes slide-in {
      from { opacity: 0; transform: translateX(14px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 1180px) {
      .board { grid-template-columns: 1fr; }
      .panel { min-width: 0; }
      .choice-grid.two-up,
      .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 900px) {
      .hero {
        flex-direction: column;
        align-items: stretch;
      }

      .hero-copy {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }

      .hero-actions {
        min-width: 0;
        width: 100%;
        justify-content: flex-start;
      }
    }

    @media (max-width: 720px) {
      .app-shell {
        padding: calc(var(--gold-bar-h) + 8px) 10px calc(var(--gold-bar-h) + 14px);
      }

      h1 {
        font-size: clamp(1.24rem, 7.2vw, 1.7rem);
        letter-spacing: 0.12em;
      }

      .hero {
        gap: 12px;
        padding: 12px;
      }

      .hero-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .status-chip,
      .ghost-button {
        width: 100%;
        min-height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding-left: 10px;
        padding-right: 10px;
        text-align: center;
      }

      .status-chip {
        grid-column: 1 / -1;
      }

      .panel-header,
      .panel-body { padding-left: 10px; padding-right: 10px; }

      .choice-button,
      .option-card,
      .summary-card,
      .tree-card {
        padding-left: 10px;
        padding-right: 10px;
      }

      .choice-grid.two-up { grid-template-columns: 1fr; }
      .stat-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

      .tree-title-row,
      .tree-level {
        flex-direction: column;
        align-items: flex-start;
      }

      .tree-title-row { gap: 4px; }
      .tree-level { gap: 6px; }
      .tree-level-header { min-width: 0; }

      .selector-overlay {
        align-items: flex-end;
        padding-left: 0;
      }

      .selector-sheet {
        width: 100%;
        height: auto;
        max-height: min(100dvh, 100%);
        padding: 14px;
        border-left: 0;
        border-top: 1px solid rgba(201, 168, 64, 0.22);
        box-shadow: 0 -10px 28px rgba(14, 10, 4, 0.3);
        animation: rise-in 200ms ease-out both;
      }
    }

    @media (max-width: 520px) {
      .hero-actions,
      .stat-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Lands of Evershade</p>
        <h1>Character Builder</h1>
      </div>
      <div class="hero-actions">
        <div id="loadStatus" class="status-chip">Loading data...</div>
        <button id="randomButton" class="ghost-button" type="button" disabled>Random build</button>
        <button id="copyLinkButton" class="ghost-button" type="button" disabled>Copy link</button>
        <button id="resetButton" class="ghost-button" type="button" disabled>Reset build</button>
      </div>
    </header>

    <div id="errorBanner" class="error-banner hidden" role="alert"></div>

    <section class="board" aria-label="Character builder workspace">
      <section class="panel" aria-labelledby="controlsTitle">
        <div class="panel-header">
          <h2 id="controlsTitle">Build Steps</h2>
        </div>
        <div class="panel-body">
          <div id="controlsPanel" class="stack"></div>
        </div>
      </section>

      <section class="panel" aria-labelledby="summaryTitle">
        <div class="panel-header">
          <h2 id="summaryTitle">Character Board</h2>
        </div>
        <div class="panel-body">
          <div id="summaryPanel" class="summary-grid"></div>
        </div>
      </section>

      <section class="panel" aria-labelledby="treesTitle">
        <div class="panel-header">
          <h2 id="treesTitle">Advancement Trees</h2>
        </div>
        <div class="panel-body">
          <div id="treesPanel" class="tree-stack"></div>
        </div>
      </section>
    </section>
  </main>

  <div id="selectorOverlay" class="selector-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="selectorTitle">
    <div class="selector-sheet">
      <div class="selector-header">
        <div>
          <p id="selectorKicker" class="eyebrow">Choose Option</p>
          <h2 id="selectorTitle">Options</h2>
          <p id="selectorDescription"></p>
        </div>
        <button id="selectorClose" class="close-button" type="button" aria-label="Close selector">&times;</button>
      </div>
      <div id="selectorOptions" class="selector-options"></div>
    </div>
  </div>

  <noscript>
    <div class="app-shell">
      <div class="error-banner">This page needs JavaScript to run the character builder.</div>
    </div>
  </noscript>

  <script>
    (() => {
      "use strict";

      const LEVEL_UP_SLOTS = 12;
      const ATTRIBUTES = ["STR", "AGI", "INT", "CHA"];
      const DICE_PROGRESSION = ["D4", "D6", "D8", "D10", "D12", "D12+D4", "D20", "D20+D6"];

      const state = {
        data: null,
        trees: new Map(),
        selectedRace: null,
        selectedAttr: null,
        selectedOrigin: null,
        selectedProf: null,
        selectedPath: null,
        levelUps: Array.from({ length: LEVEL_UP_SLOTS }, () => createLevelUpState()),
        selector: null,
      };

      const ui = {};

      document.addEventListener("DOMContentLoaded", init);

      async function init() {
        cacheUi();
        bindEvents();
        renderLoadingState();

        try {
          const response = await fetch("data.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error("Request failed with status " + response.status + ".");
          }

          state.data = await response.json();
          state.trees = new Map(
            state.data["Advancement Trees"].map((tree) => [tree.Name, tree])
          );

          setLoadStatus(
            state.data.Races.length +
              " races | " +
              state.data.Professions.length +
              " professions | " +
              state.data["Advancement Trees"].length +
              " trees"
          );
          ui.resetButton.disabled = false;
          ui.randomButton.disabled = false;
          ui.copyLinkButton.disabled = false;
          clearError();
          restoreStateFromUrl();
          render();
        } catch (error) {
          setLoadStatus("Data unavailable");
          showError(
            "Could not load data.json. If you opened this file directly from disk, serve the folder over HTTP or open the GitHub Pages version instead. " +
              error.message
          );
        }
      }

      function cacheUi() {
        ui.loadStatus = document.getElementById("loadStatus");
        ui.randomButton = document.getElementById("randomButton");
        ui.copyLinkButton = document.getElementById("copyLinkButton");
        ui.resetButton = document.getElementById("resetButton");
        ui.errorBanner = document.getElementById("errorBanner");
        ui.controlsPanel = document.getElementById("controlsPanel");
        ui.summaryPanel = document.getElementById("summaryPanel");
        ui.treesPanel = document.getElementById("treesPanel");
        ui.selectorOverlay = document.getElementById("selectorOverlay");
        ui.selectorKicker = document.getElementById("selectorKicker");
        ui.selectorTitle = document.getElementById("selectorTitle");
        ui.selectorDescription = document.getElementById("selectorDescription");
        ui.selectorOptions = document.getElementById("selectorOptions");
        ui.selectorClose = document.getElementById("selectorClose");
      }

      function bindEvents() {
        ui.resetButton.addEventListener("click", resetBuild);
        ui.randomButton.addEventListener("click", randomBuild);
        ui.copyLinkButton.addEventListener("click", copyLink);
        ui.selectorClose.addEventListener("click", closeSelector);
        ui.selectorOverlay.addEventListener("click", (event) => {
          if (event.target === ui.selectorOverlay) {
            closeSelector();
          }
        });

        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && !ui.selectorOverlay.classList.contains("hidden")) {
            closeSelector();
          }
        });
      }

      function createLevelUpState() {
        return {
          treeName: null,
          level: null,
          versionIndex: null,
        };
      }

      function resetBuild() {
        state.selectedRace = null;
        state.selectedAttr = null;
        state.selectedOrigin = null;
        state.selectedProf = null;
        state.selectedPath = null;
        state.levelUps = Array.from({ length: LEVEL_UP_SLOTS }, () => createLevelUpState());
        closeSelector();
        pushStateToUrl();
        render();
      }

      function randomBuild() {
        const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

        const race = pick(state.data.Races);
        state.selectedRace = race;
        const attrs = race.Attributes || [];
        state.selectedAttr = attrs.length ? pick(attrs) : null;

        state.selectedOrigin = pick(state.data.Origins);

        const prof = pick(state.data.Professions);
        state.selectedProf = prof;
        const paths = prof.Paths || [];
        state.selectedPath = paths.length ? pick(paths) : null;

        pushStateToUrl();
        render();
      }

      function serializeState() {
        const attrIndex = state.selectedRace && state.selectedAttr
          ? (state.selectedRace.Attributes || []).indexOf(state.selectedAttr)
          : null;

        const lu = state.levelUps.map((slot) =>
          slot.treeName !== null && slot.level !== null && slot.versionIndex !== null
            ? [slot.treeName, slot.level, slot.versionIndex]
            : null
        );
        while (lu.length > 0 && lu[lu.length - 1] === null) {
          lu.pop();
        }

        const compact = {
          r: state.selectedRace ? state.selectedRace.Name : null,
          ai: attrIndex !== null && attrIndex !== -1 ? attrIndex : null,
          o: state.selectedOrigin ? state.selectedOrigin.Name : null,
          p: state.selectedProf ? state.selectedProf.Name : null,
          pa: state.selectedPath ? state.selectedPath.Name : null,
          lu: lu.length > 0 ? lu : null,
        };

        try {
          const json = JSON.stringify(compact);
          return btoa(encodeURIComponent(json).replace(/%([0-9A-F]{2})/gi, (_, hex) => String.fromCharCode(parseInt(hex, 16))));
        } catch (_) {
          return null;
        }
      }

      function deserializeState(encoded) {
        try {
          const json = decodeURIComponent(
            atob(encoded).split("").map((c) => "%" + c.charCodeAt(0).toString(16).padStart(2, "0")).join("")
          );
          return JSON.parse(json);
        } catch (_) {
          return null;
        }
      }

      function pushStateToUrl() {
        const encoded = serializeState();
        history.replaceState(null, "", encoded ? "#" + encoded : location.pathname + location.search);
      }

      function restoreStateFromUrl() {
        const hash = location.hash.slice(1);
        if (!hash) {
          return;
        }

        const compact = deserializeState(hash);
        if (!compact) {
          console.warn("Could not restore state from URL hash.");
          return;
        }

        if (compact.r) {
          state.selectedRace = state.data.Races.find((r) => r.Name === compact.r) || null;
          if (state.selectedRace && compact.ai !== null) {
            state.selectedAttr = (state.selectedRace.Attributes || [])[compact.ai] || null;
          }
        }

        if (compact.o) {
          state.selectedOrigin = state.data.Origins.find((o) => o.Name === compact.o) || null;
        }

        if (compact.p) {
          state.selectedProf = state.data.Professions.find((p) => p.Name === compact.p) || null;
          if (state.selectedProf && compact.pa) {
            state.selectedPath = (state.selectedProf.Paths || []).find((p) => p.Name === compact.pa) || null;
          }
        }

        if (compact.lu) {
          compact.lu.forEach((entry, index) => {
            if (entry && index < LEVEL_UP_SLOTS) {
              state.levelUps[index] = {
                treeName: entry[0],
                level: entry[1],
                versionIndex: entry[2],
              };
            }
          });
        }
      }

      function copyLink() {
        pushStateToUrl();
        navigator.clipboard.writeText(location.href).then(() => {
          const original = ui.copyLinkButton.textContent;
          ui.copyLinkButton.textContent = "Copied!";
          setTimeout(() => {
            ui.copyLinkButton.textContent = original;
          }, 1800);
        });
      }

      function renderLoadingState() {
        ui.controlsPanel.replaceChildren(
          createEmptyState("Loading builder data...")
        );
        ui.summaryPanel.replaceChildren(
          createEmptyState("Loading character board...")
        );
        ui.treesPanel.replaceChildren(
          createEmptyState("Loading advancement trees...")
        );
      }

      function render() {
        if (!state.data) {
          renderLoadingState();
          return;
        }

        const levelMeta = refreshLevelUpStates();
        renderControls(levelMeta);
        renderSummary();
        renderTrees(levelMeta);
      }

      function renderControls(levelMeta) {
        const container = ui.controlsPanel;
        container.replaceChildren();

        const attrOptions = state.selectedRace ? state.selectedRace.Attributes || [] : [];
        const pathOptions = state.selectedProf ? state.selectedProf.Paths || [] : [];

        container.appendChild(singleChoiceGrid({
          label: "Race",
          main: state.selectedRace ? state.selectedRace.Name : "Choose race",
          detail: state.selectedRace
            ? raceDetail(state.selectedRace)
            : state.data.Races.length + " available options",
          complete: Boolean(state.selectedRace),
          onClick: () => openSelector({
            title: "Choose Race",
            options: state.data.Races,
            getOptionContent: describeRaceOption,
            onSelect: selectRace,
            isSelected: (option) => state.selectedRace === option,
          }),
        }));

        container.appendChild(singleChoiceGrid({
          label: "Attributes",
          main: state.selectedAttr ? formatAttributeSummary(state.selectedAttr) : "Choose attributes",
          detail: !state.selectedRace
            ? "Pick a race first."
            : attrOptions.length + " available spread" + (attrOptions.length === 1 ? "" : "s"),
          complete: Boolean(state.selectedAttr),
          empty: !state.selectedAttr,
          disabled: !state.selectedRace || attrOptions.length <= 1,
          onClick: () => openSelector({
            title: "Choose Attributes",
            options: attrOptions,
            getOptionContent: describeAttributeOption,
            onSelect: selectAttr,
            isSelected: (option) => state.selectedAttr === option,
          }),
        }));

        container.appendChild(singleChoiceGrid({
          label: "Origin",
          main: state.selectedOrigin ? state.selectedOrigin.Name : "Choose origin",
          detail: state.selectedOrigin
            ? summarizeEntry(state.selectedOrigin) || "No changes"
            : state.data.Origins.length + " available options",
          complete: Boolean(state.selectedOrigin),
          onClick: () => openSelector({
            title: "Choose Origin",
            options: state.data.Origins,
            getOptionContent: describeEntryOption,
            onSelect: selectOrigin,
            isSelected: (option) => state.selectedOrigin === option,
          }),
        }));

        container.appendChild(singleChoiceGrid({
          label: "Profession",
          main: state.selectedProf ? state.selectedProf.Name : "Choose profession",
          detail: state.selectedProf
            ? summarizeEntry(state.selectedProf) || "No changes"
            : state.data.Professions.length + " available options",
          complete: Boolean(state.selectedProf),
          onClick: () => openSelector({
            title: "Choose Profession",
            options: state.data.Professions,
            getOptionContent: describeProfessionOption,
            onSelect: selectProfession,
            isSelected: (option) => state.selectedProf === option,
          }),
        }));

        container.appendChild(singleChoiceGrid({
          label: "Path",
          main: state.selectedPath ? state.selectedPath.Name : "Choose path",
          detail: !state.selectedProf
            ? "Pick a profession first."
            : state.selectedPath
              ? summarizeEntry(state.selectedPath) || "No changes"
              : pathOptions.length + " available options",
          complete: Boolean(state.selectedPath),
          empty: !state.selectedPath,
          disabled: !state.selectedProf || pathOptions.length <= 1,
          onClick: () => openSelector({
            title: "Choose Path",
            options: pathOptions,
            getOptionContent: describeEntryOption,
            onSelect: selectPath,
            isSelected: (option) => state.selectedPath === option,
          }),
        }));

        levelMeta.forEach((meta) => {
          container.appendChild(dualChoiceGrid({
            firstButton: {
              label: "Tree",
              main: meta.selectedTree
                ? meta.selectedTree.treeName + " L" + meta.selectedTree.level
                : "Choose level up",
              detail: !meta.unlocked
                ? "Locked for now."
                : meta.treeOptions.length + " available option" + (meta.treeOptions.length === 1 ? "" : "s"),
              disabled: !meta.unlocked || meta.treeOptions.length === 0,
              accent: meta.selectedTree !== null,
              empty: meta.selectedTree === null,
              onClick: () =>
                openSelector({
                  kicker: "Level Up " + meta.slotNumber,
                  title: "Choose Level-Up Tree",
                  description: "Select which tree level to spend this slot on.",
                  options: meta.treeOptions,
                  getOptionContent: describeTreeLevelOption,
                  onSelect: (option) => selectLevelUpTree(meta.slotIndex, option),
                  isSelected: (option) =>
                    Boolean(
                      meta.selectedTree &&
                        meta.selectedTree.treeName === option.treeName &&
                        meta.selectedTree.level === option.level
                    ),
                }),
            },
            secondButton: {
              label: "Reward",
              main: meta.selectedVersion
                ? summarizeEntry(meta.selectedVersion.entry) || "No changes"
                : "Choose reward",
              detail: !meta.selectedTree
                ? "Choose a tree level first."
                : meta.versionOptions.length + " available reward" + (meta.versionOptions.length === 1 ? "" : "s"),
              disabled: !meta.selectedTree || meta.versionOptions.length <= 1,
              accent: meta.selectedVersion !== null,
              empty: meta.selectedVersion === null,
              onClick: () =>
                openSelector({
                  kicker: "Level Up " + meta.slotNumber,
                  title: "Choose Reward",
                  description: "Pick the reward version for this tree level.",
                  options: meta.versionOptions,
                  getOptionContent: describeVersionOption,
                  onSelect: (option) => selectLevelUpVersion(meta.slotIndex, option),
                  isSelected: (option) =>
                    Boolean(meta.selectedVersion && meta.selectedVersion.index === option.index),
                }),
            },
          }));
        });
      }

      function renderSummary() {
        const container = ui.summaryPanel;
        container.replaceChildren();

        if (
          !state.selectedRace &&
          !state.selectedOrigin &&
          !state.selectedProf &&
          !state.selectedPath &&
          getFilledLevelCount() === 0
        ) {
          container.appendChild(
            createEmptyState(
              "Start by choosing a race, origin, and profession. Your attributes, items, keywords, and actions will appear here as the build comes together."
            )
          );
          return;
        }

        const stats = collectCharacterStats();

        const attributeCard = document.createElement("section");
        attributeCard.className = "summary-card";
        const attributeTitle = document.createElement("h3");
        attributeTitle.textContent = "Attributes";
        attributeCard.appendChild(attributeTitle);

        const attributeGrid = document.createElement("div");
        attributeGrid.className = "stat-grid";
        const ATTRIBUTE_LIMIT = 6;
        ATTRIBUTES.forEach((attribute) => {
          attributeGrid.appendChild(
            createStatCard(attribute, String(stats.attributes[attribute] || 0), ATTRIBUTE_LIMIT)
          );
        });
        attributeCard.appendChild(attributeGrid);
        container.appendChild(attributeCard);

        const statCard = document.createElement("section");
        statCard.className = "summary-card";
        const statTitle = document.createElement("h3");
        statTitle.textContent = "Stats";
        statCard.appendChild(statTitle);

        const statGrid = document.createElement("div");
        statGrid.className = "stat-grid";
        statGrid.appendChild(createStatCard("MOV", String(stats.mov), 10));
        statGrid.appendChild(createStatCard("HP", String(stats.hp), 16));
        statGrid.appendChild(createStatCard("DIV", stats.divDie || "-"));
        statGrid.appendChild(createStatCard("Brill", String(stats.brill)));
        statCard.appendChild(statGrid);
        container.appendChild(statCard);

        const keywordSummary = formatKeywordSummary(stats.keywordCounts);
        if (keywordSummary) {
          container.appendChild(createListSection("Keywords", [keywordSummary]));
        }

        const skillSummary = formatKeywordSummary(stats.skillCounts);
        if (skillSummary) {
          container.appendChild(createListSection("Skills (max 3)", [skillSummary]));
        }

        const itemLines = Array.from(stats.items.values()).map(
          (item) => item.Name + " (" + item.Type + ")"
        );
        if (itemLines.length) {
          container.appendChild(createListSection("Items", itemLines));
        }

        const actionLines = Array.from(stats.actions.values()).map((card) => {
          return formatActionCardLabel(card._cardId, card);
        });
        if (actionLines.length) {
          const actionSection = document.createElement("section");
          actionSection.className = "summary-card";

          const actionTitle = document.createElement("h3");
          actionTitle.textContent = "Action Cards";
          actionSection.appendChild(actionTitle);

          if (stats.freeUpgrades > 0) {
            const upgradeChip = document.createElement("div");
            upgradeChip.className = "free-upgrades-chip";
            upgradeChip.textContent = stats.freeUpgrades + " free upgrade" + (stats.freeUpgrades > 1 ? "s" : "") + " available";
            actionSection.appendChild(upgradeChip);
          }

          // Group action cards by category
          const cardsByCategory = {
            Offensive: [],
            Defensive: [],
            Support: []
          };

          Array.from(stats.actions.values()).forEach((card) => {
            const category = card.Category || "Offensive"; // Default to Offensive if no category
            const cardType = card.Type || "Action"; // Default to Action if no type
            const label = formatActionCardLabel(card._cardId, card);
            
            if (cardsByCategory[category]) {
              cardsByCategory[category].push({
                label: label,
                cardId: card._cardId,
                type: cardType
              });
            }
          });

          // Render each category
          ["Offensive", "Defensive", "Support"].forEach((category) => {
            const cards = cardsByCategory[category];
            if (cards.length > 0) {
              const categoryGroup = document.createElement("div");
              categoryGroup.className = "action-category-group";

              const categoryTitle = document.createElement("h4");
              categoryTitle.className = "action-category-title";
              categoryTitle.textContent = category;
              categoryGroup.appendChild(categoryTitle);

              const actionList = document.createElement("ul");
              actionList.className = "action-list";

              cards.forEach((cardData) => {
                const li = document.createElement("li");
                li.className = "action-list-item";
                
                // Create row container
                const row = document.createElement("div");
                row.className = "action-card-row";
                
                // Create ID box
                const idBox = document.createElement("div");
                idBox.className = "action-card-id";
                if (cardData.type === "Action") {
                  idBox.classList.add("is-action");
                } else if (cardData.type === "Reaction") {
                  idBox.classList.add("is-reaction");
                }
                idBox.textContent = cardData.cardId;
                row.appendChild(idBox);
                
                // Create label box
                const labelBox = document.createElement("div");
                labelBox.className = "action-card-label";
                labelBox.textContent = cardData.label;
                row.appendChild(labelBox);
                
                li.appendChild(row);
                actionList.appendChild(li);
              });

              categoryGroup.appendChild(actionList);
              actionSection.appendChild(categoryGroup);
            }
          });

          container.appendChild(actionSection);
        }
      }

      function renderTrees(levelMeta) {
        const container = ui.treesPanel;
        container.replaceChildren();
        if (!state.selectedProf) {
          container.appendChild(
            createEmptyState(
              "No profession selected yet. Choose a profession to reveal its primary tree and any extra advancement trees."
            )
          );
          return;
        }

        const treeNames = getAccessibleAdvancementTreeNames();
        if (!treeNames.length) {
          container.appendChild(
            createEmptyState("This profession does not expose any advancement trees.")
          );
          return;
        }

        const selectedByTree = buildSelectedByTree();
        treeNames.forEach((treeName, index) => {
          const tree = state.trees.get(treeName);
          if (!tree) {
            return;
          }

          const card = document.createElement("article");
          card.className = "tree-card";

          const titleRow = document.createElement("div");
          titleRow.className = "tree-title-row";

          const title = document.createElement("h3");
          title.textContent = treeName;
          titleRow.appendChild(title);

          const type = document.createElement("div");
          type.className = "tree-type";
          type.textContent = index === 0 ? "Primary tree" : "Additional tree";
          titleRow.appendChild(type);

          card.appendChild(titleRow);

          const picked = selectedByTree[treeName] || {};
          const taken = new Set(Object.keys(picked).map((value) => Number(value)));
          const allLevels = Object.keys(tree.Levels)
            .map((value) => Number(value))
            .sort((a, b) => a - b);

          const available = new Set();
          const simulatedTaken = new Set();
          allLevels.forEach((level) => {
            if (taken.has(level)) {
              simulatedTaken.add(level);
            } else if (isAdvancementLevelUnlocked(level, simulatedTaken, 1)) {
              available.add(level);
            }
          });

          allLevels.forEach((level) => {
            const levelBlock = document.createElement("section");
            levelBlock.className = "tree-level";

            if (picked[level] !== undefined) {
              levelBlock.classList.add("selected");
            } else if (available.has(level)) {
              levelBlock.classList.add("available");
            } else {
              levelBlock.classList.add("unavailable");
            }

            const header = document.createElement("div");
            header.className = "tree-level-header";
            const name = document.createElement("span");
            name.textContent = "Level " + level;
            header.appendChild(name);

            const badge = document.createElement("span");
            badge.textContent =
              picked[level] !== undefined
                ? "Selected"
                : available.has(level)
                  ? "Available"
                  : "Locked";
            header.appendChild(badge);
            levelBlock.appendChild(header);

            const versionList = document.createElement("div");
            versionList.className = "tree-version-list";

            tree.Levels[String(level)].forEach((entry, versionIndex) => {
              const versionLine = document.createElement("div");
              versionLine.className = "tree-version";

              if (picked[level] === versionIndex) {
                versionLine.classList.add("selected");
              }

              versionLine.textContent = summarizeEntry(entry) || "No changes";
              versionList.appendChild(versionLine);
            });

            levelBlock.appendChild(versionList);
            card.appendChild(levelBlock);
          });

          container.appendChild(card);
        });
      }

      function singleChoiceGrid(config) {
        const grid = document.createElement("div");
        grid.className = "choice-grid";
        grid.appendChild(
          createChoiceButton({
            label: config.label,
            main: config.main,
            detail: config.detail,
            onClick: config.onClick,
            disabled: config.disabled,
            empty: config.empty,
            accent: config.complete,
          })
        );
        return grid;
      }

      function dualChoiceGrid(config) {
        const grid = document.createElement("div");
        grid.className = "choice-grid two-up";
        grid.appendChild(createChoiceButton(config.firstButton));
        grid.appendChild(createChoiceButton(config.secondButton));
        return grid;
      }

      function createChoiceButton(config) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice-button";
        if (config.empty) {
          button.classList.add("is-empty");
        }
        if (config.accent) {
          button.classList.add("is-accent");
        }
        button.disabled = Boolean(config.disabled);

        if (!button.disabled && typeof config.onClick === "function") {
          button.addEventListener("click", config.onClick);
        }

        const label = document.createElement("span");
        label.className = "choice-label";
        label.textContent = config.label;
        button.appendChild(label);

        const main = document.createElement("span");
        main.className = "choice-main";
        main.textContent = config.main;
        button.appendChild(main);

        const detail = document.createElement("span");
        detail.className = "choice-detail";
        detail.textContent = config.detail || "";
        button.appendChild(detail);

        return button;
      }

      function createStatCard(label, value, limit) {
        const card = document.createElement("div");
        card.className = "stat-card";

        const numericValue = parseFloat(value);
        if (limit !== undefined && !isNaN(numericValue) && numericValue > limit) {
          card.classList.add("is-over-limit");
        }

        const statValue = document.createElement("div");
        statValue.className = "stat-value";
        statValue.textContent = value;
        card.appendChild(statValue);

        const statLabel = document.createElement("div");
        statLabel.className = "stat-label";
        statLabel.textContent = label;
        card.appendChild(statLabel);

        return card;
      }

      function createListSection(title, items) {
        const section = document.createElement("section");
        section.className = "summary-card";

        const heading = document.createElement("h3");
        heading.textContent = title;
        section.appendChild(heading);

        const list = document.createElement("ul");
        list.className = "list-block";
        items.forEach((item) => {
          const li = document.createElement("li");
          li.className = "list-item";
          li.textContent = item;
          list.appendChild(li);
        });

        section.appendChild(list);
        return section;
      }

      function createEmptyState(text) {
        const box = document.createElement("div");
        box.className = "empty-state";
        box.textContent = text;
        return box;
      }

      function openSelector(config) {
        state.selector = config;
        ui.selectorKicker.textContent = config.kicker || "Choose Option";
        ui.selectorTitle.textContent = config.title || "Options";
        ui.selectorDescription.textContent = config.description || "";
        ui.selectorOptions.replaceChildren();

        if (!config.options.length) {
          ui.selectorOptions.appendChild(
            createEmptyState("No options are available here yet.")
          );
        } else {
          config.options.forEach((option) => {
            const content = config.getOptionContent(option);
            const button = document.createElement("button");
            button.type = "button";
            button.className = "option-card";
            if (config.isSelected && config.isSelected(option)) {
              button.classList.add("active");
            }

            button.addEventListener("click", () => {
              config.onSelect(option);
              closeSelector();
            });

            const titleRow = document.createElement("div");
            titleRow.className = "option-title-row";

            const title = document.createElement("div");
            title.className = "option-title";
            title.textContent = content.title;
            titleRow.appendChild(title);

            if (config.isSelected && config.isSelected(option)) {
              const check = document.createElement("div");
              check.className = "option-check";
              check.textContent = "OK";
              titleRow.appendChild(check);
            }

            button.appendChild(titleRow);

            if (content.detail) {
              const detail = document.createElement("div");
              detail.className = "option-detail";
              detail.textContent = content.detail;
              button.appendChild(detail);
            }

            ui.selectorOptions.appendChild(button);
          });
        }

        ui.selectorOverlay.classList.remove("hidden");
        document.body.style.overflow = "hidden";
        ui.selectorClose.focus();
      }

      function closeSelector() {
        state.selector = null;
        ui.selectorOverlay.classList.add("hidden");
        document.body.style.overflow = "";
      }

      function selectRace(race) {
        const raceChanged = state.selectedRace !== race;
        state.selectedRace = race;

        if (raceChanged) {
          state.selectedAttr = null;
          const attrOptions = race.Attributes || [];
          if (attrOptions.length === 1) {
            state.selectedAttr = attrOptions[0];
          }
        }

        pushStateToUrl();
        render();
      }

      function selectAttr(attr) {
        state.selectedAttr = attr;
        pushStateToUrl();
        render();
      }

      function selectOrigin(origin) {
        state.selectedOrigin = origin;
        pushStateToUrl();
        render();
      }

      function selectProfession(profession) {
        const professionChanged = state.selectedProf !== profession;
        state.selectedProf = profession;

        if (professionChanged) {
          state.selectedPath = null;
          const pathOptions = profession.Paths || [];
          if (pathOptions.length === 1) {
            state.selectedPath = pathOptions[0];
          }
          state.levelUps = Array.from({ length: LEVEL_UP_SLOTS }, () => createLevelUpState());
        }

        pushStateToUrl();
        render();
      }

      function selectPath(path) {
        state.selectedPath = path;
        pushStateToUrl();
        render();
      }

      function selectLevelUpTree(slotIndex, treeLevelOption) {
        const slot = state.levelUps[slotIndex];
        slot.treeName = treeLevelOption.treeName;
        slot.level = treeLevelOption.level;
        slot.versionIndex = null;
        pushStateToUrl();
        render();
      }

      function selectLevelUpVersion(slotIndex, versionOption) {
        state.levelUps[slotIndex].versionIndex = versionOption.index;
        pushStateToUrl();
        render();
      }

      function refreshLevelUpStates() {
        const meta = [];
        const priorSelectedOptions = [];
        let unlocked = state.selectedProf !== null;

        for (let slotIndex = 0; slotIndex < LEVEL_UP_SLOTS; slotIndex += 1) {
          const slotNumber = slotIndex + 1;
          const slotState = state.levelUps[slotIndex];
          const treeOptions = unlocked
            ? getAvailableLevelUpOptions(slotIndex, priorSelectedOptions)
            : [];

          let selectedTree =
            treeOptions.find(
              (option) =>
                slotState.treeName === option.treeName && slotState.level === option.level
            ) || null;

          if (!selectedTree) {
            if (treeOptions.length === 1) {
              selectedTree = treeOptions[0];
              slotState.treeName = selectedTree.treeName;
              slotState.level = selectedTree.level;
            } else {
              slotState.treeName = null;
              slotState.level = null;
              slotState.versionIndex = null;
            }
          }

          let versionOptions = [];
          let selectedVersion = null;

          if (selectedTree) {
            versionOptions = getVersionOptions(selectedTree);
            if (versionOptions.length === 1) {
              slotState.versionIndex = 0;
            }

            selectedVersion =
              versionOptions.find((option) => option.index === slotState.versionIndex) || null;

            if (!selectedVersion && versionOptions.length !== 1) {
              slotState.versionIndex = null;
            }
          } else {
            slotState.versionIndex = null;
          }

          const isComplete = Boolean(selectedTree && selectedVersion);

          if (isComplete) {
            priorSelectedOptions.push(selectedTree);
          }

          meta.push({
            slotIndex,
            slotNumber,
            unlocked,
            treeOptions,
            selectedTree,
            versionOptions,
            selectedVersion,
            isComplete,
          });

          unlocked = unlocked && isComplete;
        }

        return meta;
      }

      function getAvailableLevelUpOptions(slotIndex, priorSelectedOptions) {
        const slotNumber = slotIndex + 1;
        const treeNames = getAccessibleAdvancementTreeNames();
        const takenLevelsByTree = new Map();

        priorSelectedOptions.forEach((option) => {
          if (!takenLevelsByTree.has(option.treeName)) {
            takenLevelsByTree.set(option.treeName, new Set());
          }
          takenLevelsByTree.get(option.treeName).add(option.level);
        });

        const options = [];
        treeNames.forEach((treeName) => {
          const tree = state.trees.get(treeName);
          if (!tree) {
            return;
          }

          const takenLevels = takenLevelsByTree.get(treeName) || new Set();
          Object.keys(tree.Levels)
            .map((value) => Number(value))
            .sort((a, b) => a - b)
            .forEach((level) => {
              if (takenLevels.has(level)) {
                return;
              }

              if (isAdvancementLevelUnlocked(level, takenLevels, slotNumber)) {
                options.push({
                  treeName,
                  level,
                  versions: tree.Levels[String(level)],
                });
              }
            });
        });

        return options;
      }

      function getAccessibleAdvancementTreeNames() {
        if (!state.selectedProf) {
          return [];
        }

        const treeNames = [];
        const primaryTreeName = resolvePrimaryTreeName(state.selectedProf.Name);

        if (state.trees.has(primaryTreeName)) {
          treeNames.push(primaryTreeName);
        }

        (state.selectedProf["Advancement Trees"] || []).forEach((treeName) => {
          if (state.trees.has(treeName) && !treeNames.includes(treeName)) {
            treeNames.push(treeName);
          }
        });

        return treeNames;
      }

      function resolvePrimaryTreeName(professionName) {
        if (state.trees.has(professionName)) {
          return professionName;
        }

        const normalizedProfession = normalizeName(professionName);
        let bestMatch = null;

        state.trees.forEach((_, treeName) => {
          const normalizedTree = normalizeName(treeName);
          if (
            normalizedProfession.startsWith(normalizedTree) ||
            normalizedTree.startsWith(normalizedProfession)
          ) {
            if (
              !bestMatch ||
              normalizedTree.length > normalizeName(bestMatch).length
            ) {
              bestMatch = treeName;
            }
          }
        });

        return bestMatch || professionName;
      }

      function normalizeName(value) {
        return value.toLowerCase().replace(/[^a-z0-9]/g, "");
      }

      function isAdvancementLevelUnlocked(level, takenLevels, slotNumber) {
        if (level === 1) {
          return true;
        }
        if (level === 2 || level === 3) {
          return takenLevels.has(1);
        }
        if (level === 4) {
          return takenLevels.has(3);
        }
        if (level === 5) {
          return takenLevels.has(3) && slotNumber > 4;
        }
        if (level === 6) {
          return takenLevels.has(5);
        }
        if (level === 7) {
          return takenLevels.has(5) && slotNumber > 6;
        }
        if (level === 8) {
          return takenLevels.has(7);
        }
        return false;
      }

      function getSelectedAdvancementEntries() {
        const entries = [];

        state.levelUps.forEach((slotState) => {
          if (
            slotState.treeName === null ||
            slotState.level === null ||
            slotState.versionIndex === null
          ) {
            return;
          }

          const option = getTreeLevelOption(slotState.treeName, slotState.level);
          if (!option) {
            return;
          }

          const versionOptions = getVersionOptions(option);
          if (
            slotState.versionIndex >= 0 &&
            slotState.versionIndex < versionOptions.length
          ) {
            entries.push(versionOptions[slotState.versionIndex].entry);
          }
        });

        return entries;
      }

      function getTreeLevelOption(treeName, level) {
        const tree = state.trees.get(treeName);
        if (!tree) {
          return null;
        }

        const versions = tree.Levels[String(level)];
        if (!versions) {
          return null;
        }

        return {
          treeName,
          level,
          versions,
        };
      }

      function getVersionOptions(treeLevelOption) {
        return treeLevelOption.versions.map((entry, index) => ({
          index,
          entry,
        }));
      }

      function collectCharacterStats() {
        const stats = {
          attributes: Object.fromEntries(ATTRIBUTES.map((attribute) => [attribute, 0])),
          mov: 0,
          hp: 0,
          divDie: null,
          brill: 0,
          keywordCounts: new Map(),
          skillCounts: new Map(),
          items: new Map(),
          actions: new Map(),
          freeUpgrades: 0,
        };

        if (state.selectedRace) {
          applyRace(stats, state.selectedRace, state.selectedAttr);
        }

        if (state.selectedOrigin) {
          addKeywords(stats, state.selectedOrigin.Keywords || []);
          (state.selectedOrigin.Items || []).forEach((item) => addItem(stats, item));
          stats.brill += state.selectedOrigin.Brill || 0;
        }

        if (state.selectedProf) {
          addKeywords(stats, state.selectedProf.Keywords || []);
        }

        if (state.selectedPath) {
          applyEntry(stats, state.selectedPath);
        }

        getSelectedAdvancementEntries().forEach((entry) => {
          applyEntry(stats, entry);
          addSkills(stats, entry.Skills || []);
        });
        return stats;
      }

      function addKeywords(stats, values) {
        values.forEach((value) => {
          stats.keywordCounts.set(value, (stats.keywordCounts.get(value) || 0) + 1);
        });
      }

      function addSkills(stats, values) {
        values.forEach((value) => {
          stats.skillCounts.set(value, (stats.skillCounts.get(value) || 0) + 1);
        });
      }

      function addItem(stats, item) {
        const key = item.Name + "::" + item.Type;
        if (!stats.items.has(key)) {
          stats.items.set(key, item);
        }
      }

      function addAction(stats, cardId) {
        const card = state.data["Action Cards"][cardId];
        if (!card) {
          return;
        }
        const current = stats.actions.get(card.Name);
        if (!current) {
          stats.actions.set(card.Name, { ...card, _cardId: cardId });
        } else if (card.Level === current.Level) {
          stats.freeUpgrades += 1;
        } else if (card.Level > current.Level) {
          stats.actions.set(card.Name, { ...card, _cardId: cardId });
        }
      }

      function applyRace(stats, race, attributes) {
        if (attributes) {
          Object.keys(attributes).forEach((key) => {
            stats.attributes[key] += attributes[key];
          });
        }

        stats.mov = race.MOB || 0;
        stats.hp = race.HP || 0;
        stats.divDie = race.DIV || null;
        addKeywords(stats, race.Keywords || []);
        addSkills(stats, race.Skills || []);
        (race["Action cards"] || []).forEach((action) => addAction(stats, action));
      }

      function applyEntry(stats, entry) {
        (entry.Attributes || []).forEach((attributeSet) => {
          Object.keys(attributeSet).forEach((key) => {
            stats.attributes[key] += attributeSet[key];
          });
        });

        stats.mov += entry.MOB || 0;
        stats.hp += entry.HP || 0;
        stats.brill += entry.Brill || 0;
        addKeywords(stats, entry.Keywords || []);

        const divValue = entry.DIV;
        if (divValue === "Upgrade") {
          stats.divDie = upgradeDivDie(stats.divDie);
        } else if (divValue) {
          stats.divDie = divValue;
        }

        (entry.Items || []).forEach((item) => addItem(stats, item));
        (entry["Action cards"] || []).forEach((action) => addAction(stats, action));
      }

      function upgradeDivDie(divDie) {
        const currentIndex = DICE_PROGRESSION.indexOf(divDie);
        if (currentIndex === -1 || currentIndex === DICE_PROGRESSION.length - 1) {
          return divDie;
        }
        return DICE_PROGRESSION[currentIndex + 1];
      }

      function buildSelectedByTree() {
        const selectedByTree = {};

        state.levelUps.forEach((slotState) => {
          if (
            slotState.treeName === null ||
            slotState.level === null ||
            slotState.versionIndex === null
          ) {
            return;
          }

          const option = getTreeLevelOption(slotState.treeName, slotState.level);
          if (!option) {
            return;
          }

          if (!selectedByTree[option.treeName]) {
            selectedByTree[option.treeName] = {};
          }
          selectedByTree[option.treeName][option.level] = slotState.versionIndex;
        });

        return selectedByTree;
      }

      function summarizeEntry(entry) {
        const parts = [];

        (entry.Attributes || []).forEach((attributeSet) => {
          Object.entries(attributeSet).forEach(([key, value]) => {
            parts.push(value + " " + key);
          });
        });

        if (entry.HP) {
          parts.push(entry.HP + " HP");
        }
        if (entry.MOB) {
          parts.push(entry.MOB + " MOV");
        }
        if (entry.Brill) {
          parts.push(entry.Brill + " Brill");
        }

        const divValue = entry.DIV;
        if (divValue === "Upgrade") {
          parts.push("DIV Upgrade");
        } else if (divValue) {
          parts.push("DIV " + divValue);
        }

        parts.push(...(entry.Keywords || []));
        parts.push(...(entry.Skills || []));

        (entry.Items || []).forEach((item) => {
          parts.push(item.Name + " (" + item.Type + ")");
        });

        (entry["Action cards"] || []).forEach((action) => {
          parts.push(formatActionCardLabel(action));
        });

        return parts.join(", ");
      }

      function raceDetail(race) {
        const extras = [];
        const keywords = (race.Keywords || []).join(", ");
        if (keywords) {
          extras.push(keywords);
        }
        extras.push("MOV: " + (race.MOB || 0));
        extras.push("HP: " + (race.HP || 0));
        extras.push("DIV: " + (race.DIV || "-"));
        return extras.join(", ");
      }

      function formatAttributeSummary(attributeSet) {
        return ATTRIBUTES.map((key) => key + " " + (attributeSet[key] || 0)).join(", ");
      }

      function formatActionCardLabel(cardId, card) {
        if (!card) {
          card = state.data["Action Cards"][cardId];
        }
        if (!card) {
          return "";
        }
        const displayName = card.DisplayName || card.Name;
        const scale = card.ScaleAttribute ? " (Roll " + card.ScaleAttribute + ")" : "";
        return displayName + scale;
      }

      function describeRaceOption(race) {
        return {
          title: race.Name,
          detail: raceDetail(race),
        };
      }

      function describeAttributeOption(attributeSet) {
        return {
          title: formatAttributeSummary(attributeSet),
          detail: "Race attribute spread",
        };
      }

      function describeEntryOption(entry) {
        return {
          title: entry.Name,
          detail: summarizeEntry(entry) || "No changes",
        };
      }

      function describeProfessionOption(profession) {
        const details = [];
        const summary = summarizeEntry(profession);
        if (summary) {
          details.push(summary);
        }
        if (profession.Paths && profession.Paths.length) {
          details.push("Paths: " + profession.Paths.map((path) => path.Name).join(", "));
        }
        const accessibleTrees = [];
        const primaryTree = resolvePrimaryTreeName(profession.Name);
        if (state.trees.has(primaryTree)) {
          accessibleTrees.push(primaryTree);
        }
        (profession["Advancement Trees"] || []).forEach((treeName) => {
          if (!accessibleTrees.includes(treeName)) {
            accessibleTrees.push(treeName);
          }
        });
        if (accessibleTrees.length) {
          details.push("Trees: " + accessibleTrees.join(", "));
        }
        return {
          title: profession.Name,
          detail: details.join("\n"),
        };
      }

      function describeTreeLevelOption(option) {
        return {
          title: option.treeName + " - Level " + option.level,
          detail: option.versions
            .map((entry) => summarizeEntry(entry) || "No changes")
            .join("\nOR\n"),
        };
      }

      function describeVersionOption(option) {
        return {
          title: summarizeEntry(option.entry) || "No changes",
          detail: "",
        };
      }

      function formatKeywordSummary(keywordCounts) {
        if (!keywordCounts.size) {
          return "";
        }

        return Array.from(keywordCounts.keys())
          .sort((a, b) => a.localeCompare(b))
          .map((keyword) => {
            const count = keywordCounts.get(keyword);
            return count > 1 ? keyword + " x" + count : keyword;
          })
          .join(", ");
      }

      function formatSkillSummary(skillCounts) {
        if (!skillCounts.size) {
          return [];
        }

        return Array.from(skillCounts.keys())
          .sort((a, b) => a.localeCompare(b))
          .slice(0, 3)
          .map((skill) => {
            const count = skillCounts.get(skill);
            return count > 1 ? skill + " x" + count : skill;
          });
      }

      function getFilledLevelCount() {
        return state.levelUps.reduce((count, slotState) => {
          return count + (slotState.treeName !== null && slotState.versionIndex !== null ? 1 : 0);
        }, 0);
      }

      function setLoadStatus(text) {
        ui.loadStatus.textContent = text;
      }

      function showError(message) {
        ui.errorBanner.textContent = message;
        ui.errorBanner.classList.remove("hidden");
      }

      function clearError() {
        ui.errorBanner.textContent = "";
        ui.errorBanner.classList.add("hidden");
      }
    })();
  </script>
</body>
</html>
